aid: microservices-architecture
name: Microservices Architecture
description: >-
  An architectural style that structures an application as a collection of
  loosely coupled, independently deployable services, each running in its own
  process and communicating through lightweight mechanisms like HTTP/REST APIs.
  Widely used for building scalable, cloud-native applications.
